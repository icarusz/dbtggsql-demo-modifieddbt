name: nba_finals
version: '1.0.0'
config-version: 2

profile: nba_finals

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

on-run-start:
  - "CREATE SCHEMA IF NOT EXISTS main"

models:
  nba_finals:
    staging:
      +materialized: view
    marts:
      +materialized: table
      +post-hook: "COPY {{ this }} TO 'exports/{{ this.name }}.parquet' (FORMAT PARQUET)"
